<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/logo-oliva.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3fb950" />
    <meta name="description" content="Calculadora de Ofertas — Oliva Devs" />

    <!-- Soporte PWA en iOS (Safari no usa el manifest para esto) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Calculadora de Ofertas — Oliva Devs</title>
  </head>
  <body>
    <noscript>Necesitás JavaScript para usar esta app.</noscript>
    <div id="root"></div>

    <!-- Limpia Service Workers en localhost para evitar caché rota durante desarrollo -->
    <script>
      if (location.hostname === 'localhost') {
        navigator.serviceWorker?.getRegistrations().then(regs =>
          regs.forEach(r => r.unregister())
        );
      }
    </script>

    <!-- Punto de entrada de Vite -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
